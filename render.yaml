services:
  - type: web
    name: argus-investigator
    runtime: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: GEMINI_API_KEYS
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: AUTH_REQUIRED
        value: "true"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_RPM_LIMIT
        value: "10"
      - key: GEMINI_RPD_LIMIT
        value: "250"
      - key: GEMINI_TIMEOUT_SECONDS
        value: "90"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_PATH
        value: /var/data/data/argus.db
      - key: EVIDENCE_DIR
        value: /var/data/evidence
      - key: EXPORT_DIR
        value: /var/data/exports
      - key: MAX_CANDIDATES_PER_RUN
        value: "50"
      - key: MAX_MIRROR_CHECKS_PER_RUN
        value: "6"
      - key: SCREENSHOTS_ENABLED
        value: "true"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright
      - key: OSINT_FEEDS_ENABLED
        value: "false"
      - key: REQUIRE_KZ_PROXY
        value: "true"
      - key: KZ_PROXY_URL
        sync: false
      - key: KZ_PROXY_CHECK_URL
        value: https://api.country.is/
      - key: KZ_ACCESS_LABEL
        value: Kazakhstan access check
    disk:
      name: argus-data
      mountPath: /var/data
      sizeGB: 1
